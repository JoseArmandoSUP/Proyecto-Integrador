<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Tienda</title>
    <link rel="stylesheet" href="../Pantallas Css/Home.css">
</head>
<body>
    <header class="encabezado">
        <h1>Nombre de la tienda</h1>
        <div class="topbar-icons">
            <img src="../Imagenes/carrito.png" alt="Carrito" class="icon-img">
            <img src="../Imagenes/usuario.png" alt="Usuario" class="icon-img">
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-box">
                <img src="../Imagenes/buscar.png" alt="Buscar" class="icon-lupa">
                <input type="text" placeholder="¿Qué estás buscando hoy?">
            </div>
        </section>

        <article class="featured-card">
            <img src="../Imagenes/producto_principal.jpg" alt="Producto Destacado">
            <div class="featured-info">
                <h2>Nombre del Producto</h2>
                <p class="estimate">Entrega estimada: 2-3 días hábiles</p>
                <p class="precio">$ Precio</p>
                <div class="actions">
                    <button class="btn buy">Comprar ahora</button>
                    <button class="btn cart">Agregar al carrito</button>
                </div>
            </div>
        </article>

        <section class="recomendaciones">
            <h2>Recomendados para ti</h2>
            <div class="recommend-grid">
                <div class="rec-card">
                    <img src="../Imagenes/prod1.jpg" alt="Producto 1">
                    <h3>Nombre producto</h3>
                    <p class="price">$ Precio</p>
                </div>
                <div class="rec-card">
                    <img src="../Imagenes/prod2.jpg" alt="Producto 2">
                    <h3>Nombre producto</h3>
                    <p class="price">$ Precio</p>
                </div>
                <div class="rec-card">
                    <img src="../Imagenes/prod3.jpg" alt="Producto 3">
                    <h3>Nombre producto</h3>
                    <p class="price">$ Precio</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
