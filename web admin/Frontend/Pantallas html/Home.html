<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <link rel="stylesheet" href="../Pantallas Css/Home.css"/>
</head>
<body>
  <header class="encabezado">   <!-- class es un identificador para css-->
        <h1>Nombre de la tienda</h1>
    </header>

  <main class="container">
    <section class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar producto..." />
      </div>
    </section>

    <section class="featured-card">
      <img src="https://via.placeholder.com/420x260?text=Laptop+ACER+Nitro+5" alt="Imagen producto">
      <div class="featured-info">
        <h2>Nombre del producto</h2>
        <p class="estimate">Entrega estimada al 15/02/2026</p>
        <p class="precio">Precio de producto $$</p>
        <div class="actions">
          <button class="btn buy">Comprar</button>
          <button class="btn cart">Agregar a carrito</button>
        </div>
      </div>
    </section>

    <section class="recomendaciones">
      <h2>Recomendaciones</h2>
      <div class="recommend-grid">
        <article class="rec-card">
          <img src="https://via.placeholder.com/180x120?text=Lenovo+ThinkPad+L14" alt="Imagen producto">
          <h3>Nombre producto</h3>
          <p class="price">Precio producto</p>
        </article>

        <article class="rec-card">
          <img src="https://via.placeholder.com/180x120?text=Lenovo+ThinkPad+L14" alt="Imagen producto">
          <h3>Nombre producto</h3>
          <p class="price">Precio producto</p>
        </article>

        <article class="rec-card">
          <img src="https://via.placeholder.com/180x120?text=Lenovo+ThinkPad+L14" alt="Imagen producto">
          <h3>Nombre producto</h3>
          <p class="price">Precio producto</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
