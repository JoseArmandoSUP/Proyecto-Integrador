<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Prodcutos</title>
    <link rel="stylesheet" href="../Pantallas Css/registrarProducto.css">
</head>
<body>
    <header id="encabezado">
        <h1>Administración</h1>
        <div>
            <img src="../Imagenes/imagen_usuario.jpg" alt="Usuario" id="icono-usuario">
        </div>
    </header>
    
    <div id="recursos-registro">

        <div id="boton-flecha">
            <img src="../Imagenes/flecha-izquierda.png" alt="">
        </div>

        <div id="recurso-gris">
            <h2>Actualizar prductos:</h2>

            <div class="formulario-registro">
                <div class="campo">
                    <p>Nombre de producto</p>
                    <input type="text" id="nombre-producto" placeholder="Nombre">
                    <p>ID del producto</p>
                    <input type="text" id="id-producto" placeholder="124456">
                    <p>Ingresa el precio a tienda</p>
                    <input type="text" id="precio-tienda" placeholder="$120">
                </div>
                <div class="campo">
                    <p>Stock</p>
                    <input type="text" id="Solo enteros" placeholder="Solo enteros">
                    <p>Categoría</p>
                    <input type="text" id="categoria" placeholder="Electronica, ropa de hombre, etc.">
                    <p>Ingresa el precio publico</p>
                    <input type="text" id="precio-publica" placeholder="$120">
                </div>
            </div>
                <button type="submit" id="boton-registrar-producto">Actualizar</button>
            </div>
        </div>
    </body>
</html>
