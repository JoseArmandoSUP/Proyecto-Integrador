<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito</title>
  <link rel="stylesheet" href="../Pantallas Css/Carrito.css"/>
</head>
<body>
  <header class="topbar">
    <h1>Nombre de la tienda</h1>
    <h2>CARRITO</h2>
    <div class="topbar-icons">
      <span class="icon">🛒</span>
      <span class="icon">👤</span>
    </div>
  </header>

  <main class="container">
    <section class="cart-list">
      <article class="cart-item">
        <button class="select-btn" aria-label="Seleccionar producto"></button>
        <img src="https://via.placeholder.com/180x120?text=Laptop+ACER+Nitro+5" alt="Imagen producto">
        <div class="item-info">
          <h3>Nombre del producto</h3>
          <p class="price">Precio de producto</p>
        </div>
        <div class="item-actions">
          <div class="qty-control">
            <button class="qty-btn">−</button>
            <span class="qty">1</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="btn buy">Comprar</button>
          <button class="btn delete" aria-label="Eliminar producto">🗑</button>
        </div>
      </article>

      <article class="cart-item">
        <button class="select-btn" aria-label="Seleccionar producto"></button>
        <img src="https://via.placeholder.com/180x120?text=Laptop+ACER+Nitro+5" alt="Imagen producto">
        <div class="item-info">
          <h3>Nombre del producto</h3>
          <p class="price">Precio de producto</p>
        </div>
        <div class="item-actions">
          <div class="qty-control">
            <button class="qty-btn">−</button>
            <span class="qty">1</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="btn buy">Comprar</button>
          <button class="btn delete" aria-label="Eliminar producto">🗑</button>
        </div>
      </article>

      <article class="cart-item">
        <button class="select-btn" aria-label="Seleccionar producto"></button>
        <img src="https://via.placeholder.com/180x120?text=Laptop+ACER+Nitro+5" alt="Imagen producto">
        <div class="item-info">
          <h3>Nombre del producto</h3>
          <p class="price">Precio de producto</p>
        </div>
        <div class="item-actions">
          <div class="qty-control">
            <button class="qty-btn">−</button>
            <span class="qty">1</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="btn buy">Comprar</button>
          <button class="btn delete" aria-label="Eliminar producto">🗑</button>
        </div>
      </article>
    </section>

    <button class="btn buy-all">Comprar todo</button>
  </main>
</body>
</html>
