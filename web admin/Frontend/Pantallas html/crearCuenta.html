<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crerar Cuenta</title>
    <link rel="stylesheet" href="../Pantallas Css/crearCuenta.css">
</head>
<body>
    <header class="encabezado">
        <h1>Nombre de la tienda</h1>
    </header>
    <div id="recursos-registro">
        <h2 class="titulo">Crear cuenta nueva</h2>
        <form action="" id="formulario-registro">
            <input type="text" placeholder="Nombre" class="campo">
            <input type="text" placeholder="Correo electrónico" class="campo">
            <input type="text" placeholder="Numero teléfonico" class="campo">
            <input type="password" placeholder="Contraseña" class="campo">
            <button type="submit" id="Registrarse">Registrarse</button>
        </form>
    </div>
</body>
</html>
